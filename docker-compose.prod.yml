# ── docker-compose.prod.yml ──────────────────────────────────────────────────
# Deploy on EC2: copy this file + backend/ + .env.prod to the server, then:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Prerequisites on EC2:
#   - Docker + Docker Compose installed
#   - .env.prod file with all production values (copy from .env.example)
#   - Security group: ports 80, 443, 8000 open
#   - RDS MySQL already running and reachable from this EC2
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: ./backend/monolith
      dockerfile: Dockerfile
    container_name: evalitics-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    environment:
      - USE_DOTENV=false
    volumes:
      # Persist FAISS indexes and uploaded files across restarts
      - faiss_data:/app/data/faiss
      - uploads:/app/uploaded_files
      - processed:/app/processed_files
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3

volumes:
  faiss_data:
  uploads:
  processed:
