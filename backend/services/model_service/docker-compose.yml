version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    environment:
      # Forzar CPU, sin GPU
      - OLLAMA_NUM_GPU=0
      # Alternativa (puedes usar esta en vez de la anterior si prefieres):
      # - OLLAMA_NO_GPU=1
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  model_service:
    build: .
    container_name: model_service
    env_file:
      - ./.env
    environment:
      # Aseguramos conexión docker↔docker
      - OLLAMA_BASE_URL=http://ollama:11434
      # Opcional: sobreescribir explícitamente aquí también
      # - OLLAMA_MODEL=llama3.2:1b
    ports:
      - "8088:8080"
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_models:
